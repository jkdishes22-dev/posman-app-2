services:

  # Windows 10/11 installer — Electron 39, Node 22
  win10-builder:
    platform: linux/amd64          # electronuserland/builder:wine is amd64-only; Rosetta 2 emulates it on Apple Silicon
    build:
      context: .
      dockerfile: docker/Dockerfile.win10
    volumes:
      - .:/project
      - nm_win10:/project/node_modules        # isolate Linux node_modules from host macOS copy
      - ec_win10:/root/.cache/electron        # cache downloaded Electron binaries
      - eb_win10:/root/.cache/electron-builder
    environment:
      BUILD_VERSION: ${BUILD_VERSION:-1.0.0}
      JWT_SECRET: ${JWT_SECRET:-build-token}
      ELECTRON_BUILD: "true"

  # Windows 7 legacy installer — Electron 22, Node 18
  win7-builder:
    platform: linux/amd64
    build:
      context: .
      dockerfile: docker/Dockerfile.win7
    volumes:
      - .:/project
      - nm_win7:/project/node_modules
      - ec_win7:/root/.cache/electron
      - eb_win7:/root/.cache/electron-builder
    environment:
      BUILD_VERSION: ${BUILD_VERSION:-1.0.0}
      JWT_SECRET: ${JWT_SECRET:-build-token}
      ELECTRON_BUILD: "true"
      ELECTRON_VERSION: "22.3.27"

volumes:
  nm_win10:
  nm_win7:
  ec_win10:
  ec_win7:
  eb_win10:
  eb_win7: