name: Build Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g., 1.0.0)"
        required: false
        default: "0.1.0"

jobs:
  build-windows:
    name: Build Windows Installer (x64)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-cache-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx', 'next.config.mjs') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-cache-${{ hashFiles('package-lock.json') }}-

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            %LOCALAPPDATA%\electron\Cache
            %USERPROFILE%\.cache\electron-builder
          key: ${{ runner.os }}-electron-x64-v39.2.7
          restore-keys: |
            ${{ runner.os }}-electron-x64-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Next.js in standalone mode
        run: npm run build
        env:
          ELECTRON_BUILD: "true"
          NODE_ENV: "production"
          DATABASE_URL: ${{ secrets.DATABASE_URL || '' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'build-token' }}

      - name: Verify standalone build exists
        run: |
          if (-not (Test-Path ".next\standalone\server.js")) {
            Write-Error "Standalone build not found"
            exit 1
          }
          Write-Host "standalone/server.js found"

      - name: Build Windows NSIS Installer (x64)
        # compression=store avoids LZMA's 4 GB RAM requirement on the 7 GB runner.
        # The installer is larger (~600 MB) but builds reliably within CI memory limits.
        run: npx electron-builder --win --x64 --config electron-builder.config.cjs --config.compression=store --config.npmRebuild=false --publish never
        env:
          NODE_ENV: "production"
          BUILD_VERSION: ${{ github.ref_name }}
          GH_TOKEN: ""
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          ELECTRON_CACHE: "%LOCALAPPDATA%\\electron\\Cache"
          ELECTRON_BUILDER_CACHE: "%USERPROFILE%\\.cache\\electron-builder"

      - name: Verify installer was produced
        run: |
          $exes = Get-ChildItem -Path dist-electron -Filter *.exe -ErrorAction SilentlyContinue
          if ($exes.Count -eq 0) {
            Write-Error "No .exe found in dist-electron — build failed"
            exit 1
          }
          foreach ($exe in $exes) {
            Write-Host "Produced: $($exe.Name) ($([math]::Round($exe.Length / 1MB, 2)) MB)"
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: windows-installer-x64
          path: |
            dist-electron/*.exe
            dist-electron/*.exe.blockmap
            dist-electron/latest.yml
          retention-days: 7
          if-no-files-found: warn

  create-release:
    name: Create GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer-x64
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*.exe
            artifacts/*.exe.blockmap
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
