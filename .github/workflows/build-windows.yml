name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g., 1.0.0)"
        required: false
        default: "0.1.0"

jobs:
  build-and-release:
    name: Build Windows Installer (x64) and publish release
    runs-on: windows-latest
    permissions:
      contents: write  # needed for softprops/action-gh-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-cache-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx', 'next.config.mjs') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-cache-${{ hashFiles('package-lock.json') }}-

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            %LOCALAPPDATA%\electron\Cache
            %USERPROFILE%\.cache\electron-builder
          key: ${{ runner.os }}-electron-x64-v39.2.7
          restore-keys: |
            ${{ runner.os }}-electron-x64-

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-22-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Build Next.js in standalone mode
        run: npm run build
        env:
          ELECTRON_BUILD: "true"
          NODE_ENV: "production"
          DATABASE_URL: ${{ secrets.DATABASE_URL || '' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'build-token' }}

      - name: Verify standalone build exists
        run: |
          if (-not (Test-Path ".next\standalone\server.js")) {
            Write-Error "Standalone build not found"
            exit 1
          }
          Write-Host "standalone/server.js found"

      - name: Swap better-sqlite3 binary for Electron ABI
        # npm ci compiles better-sqlite3 for Node.js ABI 127; Electron 39 (utilityProcess)
        # needs ABI 140. Instead of compiling from source (fragile — needs node-gyp +
        # MSBuild + Python), download the pre-built binary from better-sqlite3's releases.
        shell: pwsh
        run: |
          Push-Location ".next/standalone/node_modules/better-sqlite3"
          # Remove the Node.js-compiled .node file
          Remove-Item -Recurse -Force "build" -ErrorAction SilentlyContinue
          # prebuild-install downloads the correct pre-built binary for the given runtime/target
          npx --yes prebuild-install --runtime electron --target 39.2.7 --arch x64 --platform win32 --tag-prefix v
          Write-Host "better-sqlite3 binary swapped for Electron 39 target"
          Pop-Location

      - name: Decode signing certificate
        shell: pwsh
        run: |
          $cert = "${{ secrets.WINDOWS_CERTIFICATE }}"
          if ($cert) {
            $bytes = [Convert]::FromBase64String($cert)
            [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\cert.pfx", $bytes)
            "CERT_PATH=$env:RUNNER_TEMP\cert.pfx" | Out-File -Append $env:GITHUB_ENV
            Write-Host "✅ Certificate decoded — installer will be signed as 'JK PosMan'"
          } else {
            Write-Host "⚠️ No WINDOWS_CERTIFICATE secret — building unsigned"
          }

      - name: Build Windows NSIS Installer (x64)
        # compression=store avoids LZMA's 4 GB RAM requirement on the 7 GB runner.
        # The installer is larger (~600 MB) but builds reliably within CI memory limits.
        run: npx electron-builder --win --x64 --config electron-builder.config.cjs --config.compression=store --config.npmRebuild=false --publish never
        env:
          NODE_ENV: "production"
          BUILD_VERSION: ${{ github.ref_name }}
          GH_TOKEN: ""
          CSC_LINK: ${{ env.CERT_PATH }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          ELECTRON_CACHE: "%LOCALAPPDATA%\\electron\\Cache"
          ELECTRON_BUILDER_CACHE: "%USERPROFILE%\\.cache\\electron-builder"

      - name: Verify installer was produced
        run: |
          $exes = Get-ChildItem -Path dist-electron -Filter *.exe -ErrorAction SilentlyContinue
          if ($exes.Count -eq 0) {
            Write-Error "No .exe found in dist-electron — build failed"
            exit 1
          }
          foreach ($exe in $exes) {
            Write-Host "Produced: $($exe.Name) ($([math]::Round($exe.Length / 1MB, 2)) MB)"
          }

      - name: Create GitHub Release and attach installer
        # Run directly on the Windows runner — no artifact upload/download needed.
        # This avoids the GitHub artifact storage quota entirely.
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            dist-electron/*.exe
            dist-electron/*.exe.blockmap
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
