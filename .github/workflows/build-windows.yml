name: Build Windows Installer

on:
  push:
    tags:
      - "v*" # Trigger on version tags like v1.0.0
  workflow_dispatch: # Allow manual triggering
    inputs:
      version:
        description: "Version number (e.g., 1.0.0)"
        required: false
        default: "0.1.0"
  release:
    types: [created] # Trigger when a release is created

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    strategy:
      matrix:
        arch: [x64, ia32] # Build for both 64-bit and 32-bit Windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js in standalone mode
        run: npm run build
        env:
          ELECTRON_BUILD: "true"
          NODE_ENV: "production"
          # Add any required environment variables for build
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Verify standalone build exists
        run: |
          if (-not (Test-Path ".next\standalone")) {
            Write-Error "Standalone build not found"
            exit 1
          }

      - name: Build Windows Installer (${{ matrix.arch }})
        run: npx electron-builder --win --${{ matrix.arch }} --config.npmRebuild=false
        env:
          NODE_ENV: "production"

      - name: Upload Windows Installer (${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ matrix.arch }}
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
          retention-days: 30
          if-no-files-found: error

      - name: Display download info (${{ matrix.arch }})
        run: |
          Write-Host "✅ Build completed successfully!"
          Write-Host ""
          Write-Host "📦 Installer files uploaded as artifacts:"
          Write-Host "   - Go to: Actions tab → This workflow run → Artifacts section"
          Write-Host "   - Download: windows-installer-${{ matrix.arch }}"
          Write-Host ""
          Get-ChildItem -Path dist -Filter *.exe | ForEach-Object {
            Write-Host "   📥 $($_.Name) ($([math]::Round($_.Length / 1MB, 2)) MB)"
          }

  create-release:
    name: Create GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows-installer-x64/*.exe
            artifacts/windows-installer-x64/*.exe.blockmap
            artifacts/windows-installer-ia32/*.exe
            artifacts/windows-installer-ia32/*.exe.blockmap
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
