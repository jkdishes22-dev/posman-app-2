name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to rollback'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - preview
      deployment_id:
        description: 'Deployment ID to rollback to (optional)'
        required: false
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install Vercel CLI
      run: npm install -g vercel@latest
      
    - name: List recent deployments
      run: |
        vercel --token ${{ secrets.VERCEL_TOKEN }} --scope ${{ secrets.VERCEL_ORG_ID }} deployments list --limit 10
        
    - name: Rollback deployment
      run: |
        if [ -n "${{ inputs.deployment_id }}" ]; then
          echo "Rolling back to specific deployment: ${{ inputs.deployment_id }}"
          vercel --token ${{ secrets.VERCEL_TOKEN }} --scope ${{ secrets.VERCEL_ORG_ID }} rollback ${{ inputs.deployment_id }}
        else
          echo "Rolling back to previous deployment"
          vercel --token ${{ secrets.VERCEL_TOKEN }} --scope ${{ secrets.VERCEL_ORG_ID }} rollback
        fi
        
    - name: Verify rollback
      run: |
        echo "Verifying rollback..."
        vercel --token ${{ secrets.VERCEL_TOKEN }} --scope ${{ secrets.VERCEL_ORG_ID }} deployments list --limit 1