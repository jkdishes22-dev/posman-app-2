name: Build Windows Installer (x64)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Allow manual triggering

jobs:
  build-windows-x64:
    name: Build Windows Installer (x64)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-cache-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx', 'next.config.mjs') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-cache-${{ hashFiles('package-lock.json') }}-

      - name: Cache Electron binaries
        uses: actions/cache@v4
        id: electron-cache
        with:
          path: |
            %LOCALAPPDATA%\electron\Cache
            %USERPROFILE%\.cache\electron-builder
          key: ${{ runner.os }}-electron-x64-v39.2.7
          restore-keys: |
            ${{ runner.os }}-electron-x64-

      - name: Install dependencies
        run: npm ci

      - name: Run security audit (non-blocking)
        run: npm audit --audit-level=moderate
        continue-on-error: true # Known issues: glob (eslint-config-next dep) and xlsx (no fix available)

      - name: Build Next.js in standalone mode
        run: npm run build
        env:
          ELECTRON_BUILD: "true"
          NODE_ENV: "production"
          # Optional: Add environment variables if your build requires them
          # Most Next.js builds don't need these, but include if your build process connects to DB
          DATABASE_URL: ${{ secrets.DATABASE_URL || '' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'build-token' }}

      - name: Verify standalone build exists
        run: |
          if (-not (Test-Path ".next\standalone")) {
            Write-Error "Standalone build not found"
            exit 1
          }

      - name: Build Windows Installer (x64)
        run: npx electron-builder --win --x64 --config.npmRebuild=false --publish never
        env:
          NODE_ENV: "production"
          # Disable auto-publishing - artifacts are uploaded for download
          # For releases, use the build-windows.yml workflow with tags
          GH_TOKEN: ""
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          # Speed optimizations
          ELECTRON_CACHE: "%LOCALAPPDATA%\\electron\\Cache"
          ELECTRON_BUILDER_CACHE: "%USERPROFILE%\\.cache\\electron-builder"

      - name: Verify .next/standalone is unpacked/copied
        run: |
          Write-Host "Verifying .next/standalone directory is accessible..."

          # Check if dist-electron directory exists
          if (-not (Test-Path "dist-electron")) {
            Write-Host "⚠️ dist-electron directory does not exist. Build may have failed."
            Write-Host "Checking for dist directory..."
            if (-not (Test-Path "dist")) {
              Write-Error "❌ Neither dist-electron nor dist directory exists. Build failed."
              exit 1
            }
          }

          # Check unpacked application directory (electron-builder creates win-x64-unpacked or similar)
          $unpackedDir = $null
          if (Test-Path "dist-electron") {
            $unpackedDir = Get-ChildItem -Path "dist-electron" -Filter "*unpacked" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $unpackedDir -and (Test-Path "dist")) {
            # Try dist directory if dist-electron doesn't have it
            $unpackedDir = Get-ChildItem -Path "dist" -Filter "*unpacked" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          }

          if ($unpackedDir) {
            Write-Host "Found unpacked directory: $($unpackedDir.FullName)"
            
            # Check for extraResources path (most reliable)
            $extraResourcesPath = Join-Path $unpackedDir.FullName "resources\.next\standalone\server.js"
            if (Test-Path $extraResourcesPath) {
              Write-Host "✅ Found .next/standalone via extraResources: $extraResourcesPath"
            } else {
              Write-Host "⚠️ extraResources path not found: $extraResourcesPath"
            }
            
            # Check for asarUnpack path
            $asarUnpackPath = Join-Path $unpackedDir.FullName "resources\app.asar.unpacked\.next\standalone\server.js"
            if (Test-Path $asarUnpackPath) {
              Write-Host "✅ Found .next/standalone via asarUnpack: $asarUnpackPath"
            } else {
              Write-Host "⚠️ asarUnpack path not found: $asarUnpackPath"
            }
            
            # At least one path must exist
            if (-not (Test-Path $extraResourcesPath) -and -not (Test-Path $asarUnpackPath)) {
              Write-Error "❌ CRITICAL: .next/standalone/server.js not found in any expected location!"
              Write-Error "   Checked:"
              Write-Error "   - $extraResourcesPath"
              Write-Error "   - $asarUnpackPath"
              Write-Error "   Build will fail at runtime. Please check electron-builder.config.js"
              exit 1
            } else {
              Write-Host "✅ Verification passed: .next/standalone is accessible"
            }
          } else {
            Write-Host "⚠️ Could not find unpacked directory to verify"
          }

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-x64
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
          retention-days: 7
          if-no-files-found: error

      - name: Display download info
        run: |
          Write-Host "✅ Build completed successfully!"
          Write-Host ""
          Write-Host "📦 Installer files uploaded as artifacts:"
          Write-Host "   - Go to: Actions tab → This workflow run → Artifacts section"
          Write-Host "   - Download: windows-installer-x64"
          Write-Host ""
          Write-Host "📥 Files available for download:"
          Get-ChildItem -Path dist -Filter *.exe | ForEach-Object {
            Write-Host "   - $($_.Name) ($([math]::Round($_.Length / 1MB, 2)) MB)"
          }
          Write-Host ""
          Write-Host "💡 Tip: Artifacts are kept for 7 days. Download them from the Actions tab!"
