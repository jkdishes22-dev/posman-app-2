name: Build Windows Installer (x64)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Allow manual triggering

jobs:
  build-windows-x64:
    name: Build Windows Installer (x64)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-cache-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx', 'next.config.mjs') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-cache-${{ hashFiles('package-lock.json') }}-

      - name: Cache Electron binaries
        uses: actions/cache@v4
        id: electron-cache
        with:
          path: |
            %LOCALAPPDATA%\electron\Cache
            %USERPROFILE%\.cache\electron-builder
          key: ${{ runner.os }}-electron-x64-v39.2.7
          restore-keys: |
            ${{ runner.os }}-electron-x64-

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-22-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run security audit (non-blocking)
        run: npm audit --audit-level=moderate
        continue-on-error: true # Known issues: glob (eslint-config-next dep) and xlsx (no fix available)

      - name: Build Next.js in standalone mode
        run: npm run build
        env:
          ELECTRON_BUILD: "true"
          NODE_ENV: "production"
          # Optional: Add environment variables if your build requires them
          # Most Next.js builds don't need these, but include if your build process connects to DB
          DATABASE_URL: ${{ secrets.DATABASE_URL || '' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'build-token' }}

      - name: Verify standalone build exists
        run: |
          if (-not (Test-Path ".next\standalone")) {
            Write-Error "Standalone build not found"
            exit 1
          }

      - name: Verify .next/standalone exists before build
        run: |
          Write-Host "Verifying .next/standalone exists before electron-builder runs..."
          if (-not (Test-Path ".next\standalone\server.js")) {
            Write-Error "❌ .next/standalone/server.js not found! Build will fail."
            Write-Host "Current directory: $(Get-Location)"
            Write-Host "Checking .next directory:"
            if (Test-Path ".next") {
              Get-ChildItem -Path ".next" -Recurse -Depth 2 | Select-Object FullName
            } else {
              Write-Host "  .next directory does not exist!"
            }
            exit 1
          }
          Write-Host "✅ .next/standalone/server.js found"
          $standaloneSize = (Get-Item ".next\standalone\server.js").Length / 1MB
          Write-Host "   Server.js size: $([math]::Round($standaloneSize, 2)) MB"

      - name: Build Windows App (x64) — zip portable for CI validation
        # Use zip target (not nsis) — NSIS compresses .next/standalone/node_modules
        # (500 MB+) and OOMs the 7 GB GitHub Windows runner. Zip just archives the
        # unpacked directory with no compression step, so it reliably fits in CI.
        # The tag-based build-windows.yml workflow uses nsis for real releases.
        run: npx electron-builder --win --x64 --config electron-builder.config.cjs --config.win.target=zip --config.npmRebuild=false --publish never
        env:
          NODE_ENV: "production"
          GH_TOKEN: ""
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          ELECTRON_CACHE: "%LOCALAPPDATA%\\electron\\Cache"
          ELECTRON_BUILDER_CACHE: "%USERPROFILE%\\.cache\\electron-builder"
          DEBUG: "electron-builder*"
          FORCE_COLOR: "1"

      - name: Verify zip output and .next/standalone inside it
        run: |
          # Confirm electron-builder produced a zip
          $zips = Get-ChildItem -Path dist-electron -Filter *.zip -ErrorAction SilentlyContinue
          if ($zips.Count -eq 0) {
            Write-Error "No .zip found in dist-electron — build failed"
            exit 1
          }
          foreach ($z in $zips) {
            Write-Host "Produced: $($z.Name) ($([math]::Round($z.Length / 1MB, 2)) MB)"
          }

          # Confirm .next/standalone is present inside the win-unpacked dir (extraResources)
          $unpacked = Get-ChildItem -Path dist-electron -Filter "*unpacked" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($unpacked) {
            $serverJs = Join-Path $unpacked.FullName "resources\.next\standalone\server.js"
            if (Test-Path $serverJs) {
              Write-Host "Verified: .next/standalone/server.js inside unpacked app"
            } else {
              Write-Error ".next/standalone/server.js missing from unpacked resources"
              exit 1
            }
          }


      - name: Upload Windows App (zip)
        uses: actions/upload-artifact@v4
        continue-on-error: true  # Don't fail CI if storage quota is temporarily exhausted
        with:
          name: windows-app-x64
          path: |
            dist-electron/*.zip
          retention-days: 1
          if-no-files-found: warn

      - name: Display build output
        run: |
          Write-Host "Build completed successfully!"
          Get-ChildItem -Path dist-electron -Filter *.zip | ForEach-Object {
            Write-Host "$($_.Name) ($([math]::Round($_.Length / 1MB, 2)) MB)"
          }
