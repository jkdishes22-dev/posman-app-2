name: Auto Release on Merge to Main

on:
  push:
    branches: [main]
    # Don't re-trigger when this workflow pushes the version bump commit
    paths-ignore:
      - "package.json"

jobs:
  release:
    name: Bump version and tag release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT or the default GITHUB_TOKEN with write access
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: version
        run: |
          # Bump patch version and auto-skip any tag that already exists.
          git fetch --tags --force
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          while git rev-parse --verify --quiet "refs/tags/v${NEW_VERSION}" >/dev/null; do
            echo "Tag v${NEW_VERSION} already exists; bumping again..."
            npm version patch --no-git-tag-version
            NEW_VERSION=$(node -p "require('./package.json').version")
          done
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped to $NEW_VERSION"

      - name: Commit version bump
        run: |
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }} [skip ci]"

      - name: Create and push tag
        run: |
          git tag "v${{ steps.version.outputs.new_version }}"
          git push origin main "v${{ steps.version.outputs.new_version }}"

      - name: Trigger release build
        # GITHUB_TOKEN pushes don't fire other workflows (GitHub security measure).
        # Dispatch build-windows.yml explicitly so the NSIS installer gets built.
        run: |
          gh workflow run build-windows.yml \
            --repo ${{ github.repository }} \
            --ref "v${{ steps.version.outputs.new_version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
