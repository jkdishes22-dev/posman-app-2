name: Deploy Preview to Vercel

on:
  push:
    branches: [ develop, feature/*, bugfix/* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run TypeScript type checking
      run: npm run tsc
      
    - name: Run ESLint
      run: npm run lint
      
    - name: Build application
      run: npm run build
      env:
        NODE_ENV: production
        DATABASE_URL: ${{ secrets.DATABASE_URL_PREVIEW }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
        NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL_PREVIEW }}
        MYSQL_HOST: ${{ secrets.MYSQL_HOST_PREVIEW }}
        MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
        MYSQL_USERNAME: ${{ secrets.MYSQL_USERNAME_PREVIEW }}
        MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD_PREVIEW }}
        MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE_PREVIEW }}
        
    - name: Deploy Preview to Vercel
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        vercel-args: '--prebuilt'
        working-directory: ./
        scope: ${{ secrets.VERCEL_ORG_ID }}